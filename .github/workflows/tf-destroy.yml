name: Terraform Destroy

on:
  workflow_dispatch:

jobs:
  destroy-apps:
    name: Terraform Destroy - Apps
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      # Initialize infra first to read its state outputs — needed to configure
      # the Kubernetes and Helm providers in the apps layer
      - name: Terraform Init - Infra (read outputs)
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Export Infra Outputs
        id: infra
        working-directory: infra
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
          echo "cluster_endpoint=$(terraform output -raw cluster_endpoint)" >> $GITHUB_OUTPUT
          echo "cluster_ca=$(terraform output -raw cluster_ca)" >> $GITHUB_OUTPUT
          echo "alb_irsa_role=$(terraform output -raw alb_irsa_role)" >> $GITHUB_OUTPUT

      - name: Terraform Init - Apps
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=terraform-apps.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy - Apps
        run: terraform destroy -auto-approve
        env:
          TF_VAR_cluster_name: ${{ steps.infra.outputs.cluster_name }}
          TF_VAR_kube_host: ${{ steps.infra.outputs.cluster_endpoint }}
          TF_VAR_kube_ca: ${{ steps.infra.outputs.cluster_ca }}
          TF_VAR_alb_irsa_role: ${{ steps.infra.outputs.alb_irsa_role }}

  destroy-infra:
    name: Terraform Destroy - Infra
    runs-on: ubuntu-latest
    needs: destroy-apps
    defaults:
      run:
        working-directory: infra
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=ps-sl-state-bucket-cavi-2" \
            -backend-config="key=terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy - Infra
        run: terraform destroy -auto-approve

## OpenTelemetry Demo chart values
## Chart: open-telemetry/opentelemetry-demo

# ── Disable sub-charts we already have in the cluster ─────────────────────────
grafana:
  enabled: false

prometheus:
  enabled: false

jaeger:
  enabled: false

opensearch:
  enabled: false

# ── Override the demo's internal OTel Collector ────────────────────────────────
# The demo chart uses a `spanmetrics` connector: it sits in the traces pipeline
# as an exporter AND in the metrics pipeline as a receiver. Removing it from
# either side causes the CrashLoopBackOff we saw. We must keep it in both
# pipelines and only swap out the final backends (Jaeger → Tempo, demo
# Prometheus → our kube-prometheus-stack).
opentelemetry-collector:
  config:
    exporters:
      otlp/tempo:
        endpoint: tempo.monitoring:4317
        tls:
          insecure: true
      prometheusremotewrite:
        endpoint: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          # Keep spanmetrics here — it feeds the metrics pipeline below
          exporters: [otlp/tempo, spanmetrics]
        metrics:
          exporters: [prometheusremotewrite]

# ── Expose the frontend via the AWS ALB Controller ────────────────────────────
components:
  frontend-proxy:
    ingress:
      enabled: true
      ingressClassName: alb
      annotations:
        alb.ingress.kubernetes.io/scheme: internet-facing
        alb.ingress.kubernetes.io/target-type: ip
        alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
        alb.ingress.kubernetes.io/healthcheck-path: /
        alb.ingress.kubernetes.io/success-codes: "200"
      hosts:
        - host: ""     # ALB hostname assigned dynamically
          paths:
            - path: /
              pathType: Prefix
              port: 8080
